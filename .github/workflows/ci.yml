name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14        # Apple Silicon runner, Xcode 15+
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug)
        run: |
          set -o pipefail
          cd macos && xcodebuild build \
            -project "Ponten.xcodeproj" \
            -scheme "Ponten" \
            -configuration Debug \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Run Unit Tests
        run: |
          set -o pipefail
          cd macos && xcodebuild test \
            -project "Ponten.xcodeproj" \
            -scheme "Ponten" \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Build (Release)
        if: github.ref == 'refs/heads/main'
        run: |
          set -o pipefail
          cd macos && xcodebuild archive \
            -project "Ponten.xcodeproj" \
            -scheme "Ponten" \
            -configuration Release \
            -archivePath "${{ runner.temp }}/Ponten.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Ponten-macOS-${{ github.sha }}
          path: ${{ runner.temp }}/Ponten.xcarchive
          retention-days: 14

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Run Tests
        run: |
          cd windows
          dotnet test Ponten.sln -c Release
        shell: bash

      - name: Build & Publish WPF Project
        run: |
          cd windows
          dotnet publish PontenWPF/PontenWPF.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          mkdir -p ../dist
          mv PontenWPF/bin/Release/net8.0-windows/win-x64/publish/PontenWPF.exe ../dist/Ponten-Windows.exe
        shell: bash

      - name: Verify Icon Resource
        run: |
          $icon = [System.Drawing.Icon]::ExtractAssociatedIcon("dist/Ponten-Windows.exe")
          if ($null -eq $icon) {
            Write-Error "Icon resource (RT_ICON) not found in the executable!"
            exit 1
          } else {
            Write-Output "Icon resource successfully verified in executable."
          }
        shell: pwsh

      - name: Compile Inno Setup Installer
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\installer.iss
        shell: pwsh

      - name: Upload Windows Artifact
        if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Ponten-Windows-${{ github.sha }}
          path: dist/
          retention-days: 14

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Build macOS DMG
        run: |
          cd macos
          chmod +x build-dmg.sh
          ./build-dmg.sh

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: Ponten-Windows-${{ github.sha }}
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            macos/dist/*.dmg
            dist/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
