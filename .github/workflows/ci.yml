name: CI — Build & Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    name: Build & Test (macOS)
    runs-on: macos-14        # Apple Silicon runner, Xcode 15+
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Show environment
        run: |
          xcodebuild -version
          swift --version

      - name: Build (Debug)
        run: |
          cd macos && xcodebuild build \
            -project "Ponten.xcodeproj" \
            -scheme "Ponten" \
            -configuration Debug \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Run Unit Tests
        run: |
          cd macos && xcodebuild test \
            -project "Ponten.xcodeproj" \
            -scheme "Ponten" \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Build (Release)
        if: github.ref == 'refs/heads/main'
        run: |
          cd macos && xcodebuild archive \
            -project "Ponten.xcodeproj" \
            -scheme "Ponten" \
            -configuration Release \
            -archivePath "${{ runner.temp }}/Ponten.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color || true

      - name: Upload build artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Ponten-macOS-${{ github.sha }}
          path: ${{ runner.temp }}/Ponten.xcarchive
          retention-days: 14

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build WPF Project
        run: |
          cd windows
          dotnet build Ponten.sln -c Release

      - name: Upload Windows Artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: Ponten-Windows-${{ github.sha }}
          path: windows/PontenWPF/bin/Release/net8.0-windows/
          retention-days: 14
